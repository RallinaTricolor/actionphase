name: CI

on:
  push:
    branches: [master, go_rewrite]
  pull_request:
    branches: [master, go_rewrite]

jobs:
  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Format check
        run: |
          cd backend
          gofmt_output=$(gofmt -l .)
          if [ -n "$gofmt_output" ]; then
            echo "The following files need formatting:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: Go vet
        run: |
          cd backend
          # Vet all packages except pkg/docs/dist (embedded frontend assets)
          go vet $(go list ./... | grep -v '/pkg/docs/dist')

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: example
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate
          migrate -version

      - name: Create test database
        env:
          PGPASSWORD: example
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE actionphase_test;"

      - name: Run migrations
        run: |
          migrate -source file://backend/pkg/db/migrations -database "postgres://postgres:example@localhost:5432/actionphase_test?sslmode=disable" up

      - name: Run mock tests (fast)
        run: |
          cd backend
          # Exclude pkg/docs/dist (embedded frontend assets)
          SKIP_DB_TESTS=true go test $(go list ./... | grep -v '/pkg/docs/dist')

      - name: Run integration tests (with database)
        env:
          TEST_DATABASE_URL: postgres://postgres:example@localhost:5432/actionphase_test?sslmode=disable
        run: |
          cd backend
          # Exclude pkg/docs/dist (embedded frontend assets)
          SKIP_DB_TESTS=false go test -p=1 $(go list ./... | grep -v '/pkg/docs/dist')

      - name: Run tests with race detector
        env:
          TEST_DATABASE_URL: postgres://postgres:example@localhost:5432/actionphase_test?sslmode=disable
        run: |
          cd backend
          # Exclude pkg/docs/dist (embedded frontend assets)
          SKIP_DB_TESTS=false go test -p=1 -race $(go list ./... | grep -v '/pkg/docs/dist')

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit tests
        run: cd frontend && npm test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        run: cd backend && go build ./...

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
